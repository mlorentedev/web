---
name: Build & Deploy

# Push-based delivery (ADR-053 / ADR-046). On push to master:
#   1. Build an immutable `sha-<short>` image (multi-arch — the VPS is ARM).
#   2. Push it to Docker Hub `<user>/kubelab-web:sha-<short>`.
#   3. Fire a repository_dispatch (`web-image-published`) to mlorentedev/kubelab,
#      whose receiver promotes the tag to staging via `toolkit deployment promote`.
# Pull requests build only (no push, no dispatch) to validate the Dockerfile.
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (build/push);
# KUBELAB_DISPATCH_TOKEN (fine-grained PAT, kubelab contents:write — the dispatch).

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  security-events: write   # upload the Trivy SARIF to the Security tab

env:
  # Docker Hub repo. The username is public (not a secret); only the token is secret,
  # used at the login step below. Hardcoding keeps PR builds (no secrets) tag-valid.
  IMAGE: mlorentedev/kubelab-web

jobs:
  build:
    name: Build${{ github.event_name == 'push' && ' & Push' || ' (PR check)' }}
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - uses: actions/checkout@v7

      - id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v4
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
          push: ${{ github.event_name == 'push' }}
          tags: ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.sha_tag }}

      # Image security scan — restored from the kubelab pipeline (don't orphan it).
      # Non-blocking for now (known npm vulns tracked in WEB-022); the SARIF still
      # lands in the Security tab. Flip to a blocking gate once the deps are clean.
      - name: Trivy image scan
        if: github.event_name == 'push'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        continue-on-error: true
        with:
          image-ref: ${{ env.IMAGE }}:${{ steps.meta.outputs.sha_tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload Trivy SARIF
        if: github.event_name == 'push' && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
          category: trivy-web

  dispatch:
    name: Notify kubelab
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to kubelab
        env:
          TOKEN: ${{ secrets.KUBELAB_DISPATCH_TOKEN }}
          TAG: ${{ needs.build.outputs.sha_tag }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mlorentedev/kubelab/dispatches \
            -d "$(printf '{"event_type":"web-image-published","client_payload":{"tag":"%s","sha":"%s"}}' "$TAG" "$GITHUB_SHA")"
          echo "Dispatched web-image-published (tag=$TAG) to mlorentedev/kubelab"
