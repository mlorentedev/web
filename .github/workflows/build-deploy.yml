---
name: Build & Deploy

# Push-based delivery (ADR-053 / ADR-046). On push to master:
#   1. Build an immutable `sha-<short>` image (multi-arch — the VPS is ARM) and
#      push it to Docker Hub `<user>/kubelab-web:sha-<short>` (build-image.yml).
#   2. Fire a repository_dispatch (`web-image-published`) to mlorentedev/kubelab,
#      whose receiver promotes the tag to staging via `toolkit deployment promote`.
# Pull requests build only (no push, no dispatch) to validate the Dockerfile.
#
# The image build is the shared reusable workflow build-image.yml — the same one
# release.yml uses for the semver prod artifact, so the staging and prod images
# come from one build definition (arch + Dockerfile parity).
#
# Required secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN (build/push);
# KUBELAB_DISPATCH_TOKEN (fine-grained PAT, kubelab contents:write — the dispatch).

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read
  security-events: write   # build-image.yml uploads the Trivy SARIF

jobs:
  meta:
    name: Compute tag
    runs-on: ubuntu-latest
    outputs:
      sha_tag: ${{ steps.meta.outputs.sha_tag }}
    steps:
      - id: meta
        run: echo "sha_tag=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build:
    name: Build
    needs: meta
    permissions:
      contents: read
      security-events: write
    uses: ./.github/workflows/build-image.yml
    with:
      tag: ${{ needs.meta.outputs.sha_tag }}
      push: ${{ github.event_name == 'push' }}
      platforms: ${{ github.event_name == 'push' && 'linux/amd64,linux/arm64' || 'linux/amd64' }}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

  dispatch:
    name: Notify kubelab
    needs: [meta, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Fire repository_dispatch to kubelab
        env:
          TOKEN: ${{ secrets.KUBELAB_DISPATCH_TOKEN }}
          TAG: ${{ needs.meta.outputs.sha_tag }}
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mlorentedev/kubelab/dispatches \
            -d "$(printf '{"event_type":"web-image-published","client_payload":{"tag":"%s","sha":"%s"}}' "$TAG" "$GITHUB_SHA")"
          echo "Dispatched web-image-published (tag=$TAG) to mlorentedev/kubelab"
