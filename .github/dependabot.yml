version: 2
updates:
  # Frontend dependencies (package.json lives in site/)
  - package-ecosystem: npm
    directory: /site
    schedule:
      interval: weekly
    groups:
      npm:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
